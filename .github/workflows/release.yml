name: release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Validate version tag matches script
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          SCRIPT_VER=$(grep '^VERSION=' bin/git-stack | head -1 | cut -d'"' -f2)
          if [ "$TAG" != "$SCRIPT_VER" ]; then
            echo "Tag v$TAG does not match VERSION=\"$SCRIPT_VER\" in bin/git-stack"
            exit 1
          fi
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            bin/git-stack
